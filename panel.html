<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Camarón Yankee</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a853;--dark:#1a1a1a;--bg:#111;--card:#1e1e1e;--border:#2a2a2a}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;padding:1rem}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.header h1{font-size:1.4rem;font-weight:600}
.header h1 span{color:var(--gold)}
.stats{display:flex;gap:0.8rem}
.stat{background:var(--card);border-radius:12px;padding:0.8rem 1rem;text-align:center;min-width:80px}
.stat .num{font-size:1.5rem;font-weight:700;color:var(--gold)}
.stat .label{font-size:0.65rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.5px}

.filters{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:none;color:#fff;font-family:'Inter',sans-serif;font-size:0.8rem;cursor:pointer;transition:all 0.2s}
.filter-btn.active{border-color:var(--gold);background:rgba(212,168,83,0.15);color:var(--gold)}

.table{width:100%;border-collapse:collapse;margin-top:1rem}
.table th{text-align:left;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;opacity:0.4;padding:0.8rem 0.5rem;border-bottom:1px solid var(--border)}
.table td{padding:0.8rem 0.5rem;border-bottom:1px solid var(--border);font-size:0.85rem;vertical-align:middle}
.table tr:hover td{background:rgba(255,255,255,0.02)}

.badge{padding:0.2rem 0.6rem;border-radius:6px;font-size:0.7rem;font-weight:500}
.badge.confirmed{background:rgba(76,175,80,0.15);color:#66bb6a}
.badge.pending{background:rgba(255,183,77,0.15);color:#ffb74d}
.badge.cancelled{background:rgba(244,67,54,0.15);color:#ef5350}
.badge.comedor{background:rgba(100,181,246,0.15);color:#64b5f6}
.badge.playa{background:rgba(255,183,77,0.15);color:#ffcc80}

.empty{text-align:center;padding:3rem;opacity:0.3;font-size:0.9rem}

.date-nav{display:flex;align-items:center;gap:0.8rem;margin-bottom:1.5rem}
.date-nav input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem;color:#fff;font-family:'Inter',sans-serif;font-size:0.9rem}
.date-nav button{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem;color:#fff;cursor:pointer;font-size:0.85rem}

@media(max-width:600px){
  .table{font-size:0.8rem}
  .hide-mobile{display:none}
}
</style>
</head>
<body>

<div class="header">
  <h1>🦐 Camarón <span>Yankee</span> — Panel</h1>
  <div class="stats">
    <div class="stat"><div class="num" id="total-today">0</div><div class="label">Hoy</div></div>
    <div class="stat"><div class="num" id="total-guests">0</div><div class="label">Personas</div></div>
    <div class="stat"><div class="num" id="total-comedor">0</div><div class="label">Comedor</div></div>
    <div class="stat"><div class="num" id="total-playa">0</div><div class="label">Playa</div></div>
  </div>
</div>

<div class="date-nav">
  <button onclick="changeDate(-1)">◀</button>
  <input type="date" id="view-date" onchange="loadReservations()">
  <button onclick="changeDate(1)">▶</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">Todas</button>
  <button class="filter-btn" data-filter="comedor" onclick="setFilter(this)">🏠 Comedor</button>
  <button class="filter-btn" data-filter="playa" onclick="setFilter(this)">🏖️ Playa</button>
  <button class="filter-btn" data-filter="confirmed" onclick="setFilter(this)">✅ Confirmadas</button>
</div>

<table class="table">
  <thead>
    <tr>
      <th>Hora</th>
      <th>Nombre</th>
      <th>Pers.</th>
      <th>Zona</th>
      <th class="hide-mobile">Mesa</th>
      <th>Estado</th>
      <th class="hide-mobile">Notas</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="empty" id="empty" style="display:none">No hay reservaciones para este día</div>

<script>
const SUPABASE_URL = 'https://ljoijartskdysrcabmaq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxqb2lqYXJ0c2tkeXNyY2FibWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI2NjUzNDgsImV4cCI6MjA1ODI0MTM0OH0.bMOst22v5ep-WSTFMxMjcqkH3GmhJp49TgT3D7MMYnU';

let currentFilter = 'all';
let reservations = [];

document.getElementById('view-date').value = new Date().toISOString().split('T')[0];

function changeDate(dir){
  const input = document.getElementById('view-date');
  const d = new Date(input.value);
  d.setDate(d.getDate() + dir);
  input.value = d.toISOString().split('T')[0];
  loadReservations();
}

function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderTable();
}

async function loadReservations(){
  const date = document.getElementById('view-date').value;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reservaciones?date=eq.${date}&order=time.asc`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) throw new Error();
    reservations = await res.json();
  } catch(e) {
    reservations = JSON.parse(localStorage.getItem('reservaciones')||'[]').filter(r=>r.date===date);
  }
  renderTable();
}

function renderTable(){
  let filtered = reservations;
  if(currentFilter==='comedor') filtered = filtered.filter(r=>r.area==='comedor');
  if(currentFilter==='playa') filtered = filtered.filter(r=>r.area==='playa');
  if(currentFilter==='confirmed') filtered = filtered.filter(r=>r.status==='confirmed');

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  if(filtered.length===0){
    tbody.innerHTML='';
    empty.style.display='block';
  } else {
    empty.style.display='none';
    tbody.innerHTML = filtered.map(r => `<tr>
      <td><strong>${r.time||'-'}</strong></td>
      <td>${r.name}</td>
      <td>${r.guests}</td>
      <td><span class="badge ${r.area}">${r.area==='comedor'?'🏠':'🏖️'} ${r.area}</span></td>
      <td class="hide-mobile">${r.table_id||'—'}</td>
      <td><span class="badge ${r.status}">${r.status}</span></td>
      <td class="hide-mobile">${r.notes||'—'}</td>
    </tr>`).join('');
  }

  // Stats
  document.getElementById('total-today').textContent = reservations.length;
  document.getElementById('total-guests').textContent = reservations.reduce((s,r)=>s+(r.guests||0),0);
  document.getElementById('total-comedor').textContent = reservations.filter(r=>r.area==='comedor').length;
  document.getElementById('total-playa').textContent = reservations.filter(r=>r.area==='playa').length;
}

loadReservations();
</script>
</body>
</html>
